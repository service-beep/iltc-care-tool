  box.style.display='block';

});

// ========== 後端設定（部署後請填入 Worker URL） ==========
// 空字串 = 使用者自備 API Key 的純本地模式
// 填入 URL = 使用平台後端（LINE 登入 + 內建 AI）
const BACKEND_URL = 'https://billowing-river-dcf6iltc-backend.service-ed8.workers.dev';
const USE_BACKEND = !!BACKEND_URL;

// Bearer Token 管理（存 localStorage，取代 cookie 避開跨網域問題）
const TOKEN_KEY = 'iltc_v2_token';
const getToken = () => { try { return localStorage.getItem(TOKEN_KEY) || ''; } catch { return ''; } };
const setToken = (t) => { try { if (t) localStorage.setItem(TOKEN_KEY, t); else localStorage.removeItem(TOKEN_KEY); } catch {} };

// 從 URL hash 抓登入後回來的 token
(function consumeLoginToken() {
  try {
    if (location.hash && location.hash.startsWith('#t=')) {
      const t = decodeURIComponent(location.hash.slice(3));
      setToken(t);
      // 清掉網址上的 token
      history.replaceState(null, '', location.pathname + location.search);
    }
  } catch {}
})();

// 統一的 API 呼叫 wrapper：帶 Bearer token
async function apiFetch(path, opts = {}) {
  const headers = { ...(opts.headers || {}) };
  const tok = getToken();
  if (tok) headers['Authorization'] = 'Bearer ' + tok;
  if (opts.body && !headers['Content-Type'] && typeof opts.body === 'string') headers['Content-Type'] = 'application/json';
  const res = await fetch(BACKEND_URL + path, { ...opts, headers });
  return res;
}
// 從錯誤 response 取出可讀訊息（後端統一回 {error, request_id}）
async function readError(res) {
  try {
    const j = await res.clone().json();
    return j.error || ('伺服器錯誤 (' + res.status + ')');
  } catch {
    try { return (await res.text()).slice(0, 200); } catch { return '伺服器錯誤'; }
  }
}

// ========== 數值判定（正常/異常） ==========
function classifyBP(sys, dia) {
  if (!sys) return null;
  if (sys < 90 || dia < 60) return { level: 'low', labelKey: 'statusVeryLow', color: 'blue' };
  if (sys >= 180 || dia >= 110) return { level: 'crisis', labelKey: 'statusHigh', color: 'red' };
  if (sys >= 140 || dia >= 90) return { level: 'high', labelKey: 'statusHigh', color: 'red' };
  if (sys >= 130 || dia >= 80) return { level: 'elevated', labelKey: 'statusElevated', color: 'amber' };
  return { level: 'normal', labelKey: 'statusNormal', color: 'emerald' };
}
function classifyGlucose(value, type) {
  if (!value) return null;
  if (value < 70) return { level: 'low', labelKey: 'statusVeryLow', color: 'blue' };
  if (type === 'fasting') {
    if (value >= 126) return { level: 'high', labelKey: 'statusHigh', color: 'red' };
    if (value >= 100) return { level: 'elevated', labelKey: 'statusElevated', color: 'amber' };
  } else {
    if (value >= 200) return { level: 'high', labelKey: 'statusHigh', color: 'red' };
    if (value >= 140) return { level: 'elevated', labelKey: 'statusElevated', color: 'amber' };
  }
  return { level: 'normal', labelKey: 'statusNormal', color: 'emerald' };
}
function classifySpo2(v) {
  if (!v) return null;
  if (v < 90) return { level: 'crisis', labelKey: 'statusVeryLow', color: 'red' };
  if (v < 95) return { level: 'low', labelKey: 'statusLow', color: 'amber' };
  return { level: 'normal', labelKey: 'statusNormal', color: 'emerald' };
}
function classifyTemp(v) {
  if (!v) return null;
  if (v >= 38) return { level: 'fever', labelKey: 'statusFever', color: 'red' };
  if (v >= 37.3) return { level: 'elevated', labelKey: 'statusElevated', color: 'amber' };
  if (v < 36) return { level: 'low', labelKey: 'statusLow', color: 'blue' };
  return { level: 'normal', labelKey: 'statusNormal', color: 'emerald' };
}

// ========== Reducer ==========
function reducer(state, action) {
  const pid = state.currentPatientId;
  const setColl = (coll, arr) => ({ ...state, [coll]: { ...state[coll], [pid]: arr } });
  switch (action.type) {
    case 'SET_STATE': return action.payload;
    case 'ADD_PATIENT': { const p = { id: uid(), createdAt: now(), ...action.payload }; return { ...state, patients: [...state.patients, p], currentPatientId: p.id }; }
    case 'UPDATE_PATIENT': return { ...state, patients: state.patients.map(p => p.id === action.payload.id ? { ...p, ...action.payload } : p) };
    case 'DELETE_PATIENT': { const rest = state.patients.filter(p => p.id !== action.payload); return { ...state, patients: rest, currentPatientId: rest[0]?.id || null }; }
    case 'SET_CURRENT_PATIENT': return { ...state, currentPatientId: action.payload };
    case 'ADD_VITAL': return setColl('vitals', [...(state.vitals[pid]||[]), { id: uid(), ...action.payload }]);
    case 'DELETE_VITAL': return setColl('vitals', (state.vitals[pid]||[]).filter(v => v.id !== action.payload));
    case 'ADD_MEDICATION': return setColl('medications', [...(state.medications[pid]||[]), { id: uid(), active: true, ...action.payload }]);
    case 'UPDATE_MEDICATION': return setColl('medications', (state.medications[pid]||[]).map(m => m.id === action.payload.id ? { ...m, ...action.payload } : m));
    case 'DELETE_MEDICATION': return setColl('medications', (state.medications[pid]||[]).filter(m => m.id !== action.payload));
    case 'ADD_CONSULTATION': return setColl('consultations', [...(state.consultations[pid]||[]), { id: uid(), ...action.payload }]);
    case 'UPDATE_CONSULTATION': return setColl('consultations', (state.consultations[pid]||[]).map(c => c.id === action.payload.id ? { ...c, ...action.payload } : c));
    case 'DELETE_CONSULTATION': return setColl('consultations', (state.consultations[pid]||[]).filter(c => c.id !== action.payload));
    case 'ADD_CARELOG': return setColl('careLogs', [...(state.careLogs[pid]||[]), { id: uid(), ...action.payload }]);
    case 'DELETE_CARELOG': return setColl('careLogs', (state.careLogs[pid]||[]).filter(l => l.id !== action.payload));
    case 'ADD_QUESTION': return setColl('preVisitQuestions', [...(state.preVisitQuestions[pid]||[]), { id: uid(), ...action.payload, done: false, createdAt: now() }]);
    case 'TOGGLE_QUESTION': return setColl('preVisitQuestions', (state.preVisitQuestions[pid]||[]).map(q => q.id === action.payload ? { ...q, done: !q.done } : q));
    case 'DELETE_QUESTION': return setColl('preVisitQuestions', (state.preVisitQuestions[pid]||[]).filter(q => q.id !== action.payload));
    case 'SET_AI_REMINDERS': return setColl('aiReminders', action.payload);
    case 'UPDATE_SETTINGS': return { ...state, settings: { ...state.settings, ...action.payload } };
    default: return state;
  }
}

// ========== AI Provider 呼叫抽象 ==========
async function callAI(settings, system, user) {
  // 後端模式優先
  if (USE_BACKEND) {
    const res = await apiFetch('/api/ai/chat', { method: 'POST', body: JSON.stringify({ system, user }) });
    if (!res.ok) { const err = await res.text(); throw new Error(err); }
    const data = await res.json();
    return data.text || '';
  }
  const provider = settings.aiProvider || 'gemini';
  if (provider === 'gemini') {
    const model = settings.model || 'gemini-1.5-flash';
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${settings.apiKey}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system_instruction: { parts: [{ text: system }] }, contents: [{ role: 'user', parts: [{ text: user }] }] })
    });
    if (!res.ok) throw new Error(await readError(res));
    const data = await res.json();
    return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  } else if (provider === 'openai') {
    const model = settings.model || 'gpt-4o-mini';
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + settings.apiKey },
      body: JSON.stringify({ model, messages: [{ role: 'system', content: system }, { role: 'user', content: user }] })
    });
    if (!res.ok) throw new Error(await readError(res));
    const data = await res.json();
    return data.choices?.[0]?.message?.content || '';
  } else {
    const model = settings.model || 'claude-sonnet-4-5';
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'x-api-key': settings.apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model, max_tokens: 2000, system, messages: [{ role: 'user', content: user }] })
    });
    if (!res.ok) throw new Error(await readError(res));
    const data = await res.json();
    return data.content?.[0]?.text || '';
  }
}

  if (provider === 'gemini') {
    const model = settings.model || 'gemini-1.5-flash';
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${settings.apiKey}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: system }] },
        contents: [{ role: 'user', parts: [{ text: user }, { inline_data: { mime_type: mimeType, data: imageBase64 } }] }]
      })
    });

    const data = await res.json();
    return data.candidates?.[0]?.content?.parts?.[0]?.text || '';

    const model = settings.model || 'gpt-4o-mini';
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + settings.apiKey },
      body: JSON.stringify({ model, messages: [
        { role: 'system', content: system },
        { role: 'user', content: [{ type: 'text', text: user }, { type: 'image_url', image_url: { url: `data:${mimeType};base64,${imageBase64}` } }] }
      ] })
    });
    if (!res.ok) throw new Error(await readError(res));

    return data.choices?.[0]?.message?.content || '';

// 取得支援的 mime type（各瀏覽器不同）
const pickMimeType = () => {
  const candidates = ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4', 'audio/mpeg', 'audio/ogg'];
  if (typeof MediaRecorder === 'undefined') return null;
  for (const m of candidates) { if (MediaRecorder.isTypeSupported(m)) return m; }
  return '';
};

const VoiceBtn = ({ onResult, lang = 'zh-TW', className = '' }) => {
  const [rec, setRec] = useState(false);
  const [busy, setBusy] = useState(false);
  const recRef = useRef(null);
  const chunksRef = useRef([]);
  const streamRef = useRef(null);

  const start = async () => {
    if (!USE_BACKEND) { alert('語音輸入需要平台模式（LINE / Google 登入後使用）'); return; }
    if (!navigator.mediaDevices?.getUserMedia || typeof MediaRecorder === 'undefined') {
      alert('此瀏覽器不支援錄音。請改用 Chrome / Safari 14.3+ / Edge');
      return;
    }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true, sampleRate: 16000, channelCount: 1 } });
      streamRef.current = stream;
      const mimeType = pickMimeType();
      const mr = new MediaRecorder(stream, mimeType ? { mimeType } : undefined);
      chunksRef.current = [];
      mr.ondataavailable = (e) => { if (e.data.size > 0) chunksRef.current.push(e.data); };
      mr.onstop = async () => {
        streamRef.current?.getTracks().forEach(t => t.stop());
        streamRef.current = null;
        const type = mr.mimeType || 'audio/webm';
        const blob = new Blob(chunksRef.current, { type });
        if (blob.size < 800) { setBusy(false); return; } // 太短忽略
        setBusy(true);
        try {
          const ext = type.includes('mp4') ? 'mp4' : type.includes('ogg') ? 'ogg' : 'webm';
          const form = new FormData();
          form.append('audio', blob, 'rec.' + ext);
          form.append('mode', 'short');
          const tok = getToken();
          const res = await fetch(BACKEND_URL + '/api/ai/transcribe', {
            method: 'POST',
            headers: tok ? { 'Authorization': 'Bearer ' + tok } : {},
            body: form
          });
          if (!res.ok) throw new Error(await readError(res));
          const data = await res.json();
          if (data.text) onResult(data.text);
        } catch (e) { alert('辨識失敗：' + (e.message || e).toString().slice(0, 200)); }
        finally { setBusy(false); }
      };
      recRef.current = mr;
      mr.start();
      setRec(true);
    } catch (e) {
      alert('無法取用麥克風：' + (e.message || e.name || '未知') + '\n\n請確認已允許麥克風權限。');
    }
  };
  const stop = () => {
    try { recRef.current?.stop(); } catch {}
    recRef.current = null;
    setRec(false);
  };
  const toggle = () => (busy ? null : rec ? stop() : start());
  return (
    <button type="button" onClick={toggle} disabled={busy}
      title={busy ? '辨識中...' : rec ? '點擊結束錄音' : '按下開始錄音'}
      className={'flex items-center justify-center w-10 h-10 rounded-lg border shrink-0 transition ' +
        (busy ? 'bg-slate-100 border-slate-200 text-slate-400' :
         rec ? 'recording border-red-500 text-white' :
         'bg-white border-slate-300 text-slate-500 hover:bg-slate-50') + ' ' + className}>
      {busy
        ? <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="animate-spin"><path d="M21 12a9 9 0 1 1-6.2-8.55"/></svg>
        : <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
      }
    </button>
  );
};

function SyncIndicator({ status, error }) {
  const [showTip, setShowTip] = useState(false);
  if (!USE_BACKEND || status === 'idle') return null;
  const color = status === 'synced' ? 'bg-emerald-500' : status === 'saving' ? 'bg-amber-400' : status === 'loading' ? 'bg-cyan-400' : 'bg-red-500';
  const label = status === 'synced' ? '已同步' : status === 'saving' ? '同步中' : status === 'loading' ? '載入中' : '同步失敗';
  return (
    <button onClick={() => setShowTip(!showTip)} className="relative flex items-center gap-1 text-xs text-slate-500 hover:text-slate-700 px-2 py-1">

    if (!email.includes('@')) return alert('Please enter a valid email');
    const pid = 'email_' + email.toLowerCase().replace(/[^a-z0-9]/g, '_');
    onLogin({ id: pid, name: name || email.split('@')[0], email, type: 'email' });
    onClose();
  };
  const loginGuest = () => {
    const pid = 'guest_' + Date.now().toString(36);
    onLogin({ id: pid, name: name || 'Guest', type: 'guest' });

      window.location.href = BACKEND_URL + '/api/auth/line/start';

// ========== Patient Editor ==========
function PatientEditor({ patient, onClose, lang }) {
  const { dispatch } = useContext(AppCtx);
  const isNew = !patient.id;
  const [form, setForm] = useState({ name: '', birthDate: '', gender: '', bloodType: '', weight: '', height: '', allergies: '', conditions: '', medicalHistory: '', ...patient });
  const up = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const submit = (e) => {
    e.preventDefault();
    if (!form.name.trim()) return alert('Name required');
    dispatch({ type: isNew ? 'ADD_PATIENT' : 'UPDATE_PATIENT', payload: form });
    onClose();
  };
  const remove = () => { if (confirm('Delete?')) { dispatch({ type: 'DELETE_PATIENT', payload: form.id }); onClose(); } };
  const commonConditions = ['高血壓', '糖尿病', '高血脂', '心律不整', '失智', '中風後', '慢性腎病', '氣喘', '關節炎', '骨質疏鬆'];
  const commonAllergies = ['青黴素', '磺胺類', '海鮮', '花生', '阿斯匹靈', '顯影劑', '堅果', '乳製品'];
  return (
    <Modal open={true} onClose={onClose} title={isNew ? t('addPatient', lang) : t('editPatient', lang)} maxWidth="max-w-xl">
      <form onSubmit={submit} className="space-y-4">
        <div className="grid grid-cols-2 gap-3">
          <div><Label required>{t('name', lang)}</Label><Input value={form.name} onChange={e => up('name', e.target.value)} placeholder="阿嬤 / Mom" /></div>
          <div><Label>{t('birthDate', lang)}</Label><Input type="date" value={form.birthDate} onChange={e => up('birthDate', e.target.value)} /></div>
          <div><Label>{t('gender', lang)}</Label><Chips options={[['女', t('female', lang)],['男', t('male', lang)]]} value={form.gender} onChange={v => up('gender', v || '')} /></div>
          <div><Label>{t('bloodType', lang)}</Label><Chips options={['A','B','O','AB']} value={form.bloodType} onChange={v => up('bloodType', v || '')} /></div>
          <div><Label>{t('weight', lang)} (kg)</Label><Input type="number" step="0.1" value={form.weight} onChange={e => up('weight', e.target.value)} /></div>
          <div><Label>{t('height', lang)} (cm)</Label><Input type="number" value={form.height} onChange={e => up('height', e.target.value)} /></div>
        </div>
        <div><Label>{t('conditions', lang)}</Label>
          <Chips options={commonConditions} value={(form.conditions || '').split('、').filter(Boolean)} multi onChange={v => up('conditions', v.join('、'))} className="mb-2" />
          <VoiceInput value={form.conditions} onChange={v => up('conditions', v)} />
        </div>
        <div><Label>{t('allergies', lang)}</Label>
          <Chips options={commonAllergies} value={(form.allergies || '').split('、').filter(Boolean)} multi onChange={v => up('allergies', v.join('、'))} className="mb-2" />
          <VoiceInput value={form.allergies} onChange={v => up('allergies', v)} />
        </div>
        <div><Label>{t('medicalHistory', lang)}</Label><VoiceTextArea rows={3} value={form.medicalHistory} onChange={v => up('medicalHistory', v)} /></div>
        <div className="flex gap-2 pt-3">
          <Btn type="submit" className="flex-1">{isNew ? t('create', lang) : t('save', lang)}</Btn>
          {!isNew && <Btn variant="danger" onClick={remove}>{t('delete', lang)}</Btn>}
          <Btn variant="secondary" onClick={onClose}>{t('cancel', lang)}</Btn>
        </div>
      </form>
    </Modal>
  );

// ========== Dashboard ==========
function Dashboard({ lang }) {
  const { state } = useContext(AppCtx);
  const pid = state.currentPatientId;
  const patient = state.patients.find(p => p.id === pid);
  const vitals = state.vitals[pid] || [];
  const meds = state.medications[pid] || [];
  const consults = state.consultations[pid] || [];
  const careLogs = state.careLogs[pid] || [];
  const isEmpty = vitals.length === 0 && meds.length === 0 && consults.length === 0 && careLogs.length === 0;
  const latestBP = [...vitals].filter(v => v.systolic).sort((a,b) => new Date(b.datetime) - new Date(a.datetime))[0];
  const latestGlu = [...vitals].filter(v => v.glucose).sort((a,b) => new Date(b.datetime) - new Date(a.datetime))[0];
  const activeMeds = meds.filter(m => m.active);
  const nextVisit = consults.filter(c => c.nextVisit && new Date(c.nextVisit) >= new Date()).sort((a,b) => new Date(a.nextVisit) - new Date(b.nextVisit))[0];
  const alerts = useMemo(() => {
    const out = [];
    const recent = vitals.filter(v => daysBetween(v.datetime, now()) <= 7);
    const bps = recent.filter(v => v.systolic);
    const abn = bps.filter(v => { const s = classifyBP(v.systolic, v.diastolic); return s && (s.level === 'high' || s.level === 'crisis'); });
    if (abn.length >= 2) out.push(`近 7 天血壓異常 ${abn.length} 次`);
    const glHigh = recent.filter(v => v.glucose).filter(v => { const s = classifyGlucose(v.glucose, v.glucoseType); return s && (s.level === 'high' || s.level === 'elevated'); });
    if (glHigh.length >= 2) out.push(`近 7 天血糖異常 ${glHigh.length} 次`);
    return out;
  }, [vitals]);
  return (
    <div className="space-y-4">
      {isEmpty && patient && (
        <div className="bg-gradient-to-br from-cyan-50 to-blue-50 border border-cyan-200 rounded-2xl p-5">
          <div className="font-semibold text-cyan-800 mb-1">{t('welcomeCreated', lang)}：{patient.name}</div>
          <div className="text-sm text-cyan-700">從下方分頁開始記錄。</div>
        </div>
      )}
      {alerts.length > 0 && (
        <div className="bg-amber-50 border border-amber-200 rounded-xl p-4">
          <div className="font-semibold text-amber-800 mb-2">{t('alertsTitle', lang)}</div>
          {alerts.map((a, i) => <div key={i} className="text-sm text-amber-800">· {a}</div>)}
        </div>
      )}
      <div className="grid grid-cols-2 gap-3">
        <StatCard title={t('latestBP', lang)} value={latestBP ? `${latestBP.systolic}/${latestBP.diastolic}` : '—'} sub={latestBP ? fmtDateTime(latestBP.datetime) : '—'} status={latestBP ? classifyBP(latestBP.systolic, latestBP.diastolic) : null} lang={lang} />
        <StatCard title={t('latestGlucose', lang)} value={latestGlu ? `${latestGlu.glucose}` : '—'} unit={latestGlu ? 'mg/dL' : ''} sub={latestGlu ? fmtDateTime(latestGlu.datetime) : '—'} status={latestGlu ? classifyGlucose(latestGlu.glucose, latestGlu.glucoseType) : null} lang={lang} />
        <StatCard title={t('currentMeds', lang)} value={activeMeds.length} unit={t('medsUnit', lang)} />
        <StatCard title={t('nextVisit', lang)} value={nextVisit ? fmtDate(nextVisit.nextVisit) : '—'} sub={nextVisit ? `${nextVisit.hospital} ${nextVisit.department}` : '—'} small />
      </div>
    </div>
  );
}

// ========== Vitals ==========
function Vitals({ lang }) {
  const { state, dispatch } = useContext(AppCtx);
  const pid = state.currentPatientId;
  const records = state.vitals[pid] || [];
  const [showForm, setShowForm] = useState(false);
  const [range, setRange] = useState(30);
  const chartData = useMemo(() => {
    const cutoff = new Date(Date.now() - range * 86400000);
    return [...records].filter(r => new Date(r.datetime) >= cutoff).sort((a,b) => new Date(a.datetime) - new Date(b.datetime));
  }, [records, range]);
  return (
    <div className="space-y-4">
      <div className="flex justify-end">
        <Btn onClick={() => setShowForm(true)}>＋ {t('addRecord', lang)}</Btn>
      </div>
      {chartData.length > 0 ? (
        <>
          <VitalChart data={chartData} field="bp" title={t('systolic', lang) + ' / ' + t('diastolic', lang)} />

                  {v.glucose && <div className="flex items-center gap-2"><span className="text-sm">{t('glucose', lang)} <strong>{v.glucose}</strong>（{gluText(v.glucoseType, lang)}）</span><StatusBadge status={glS} lang={lang} /></div>}

                  {v.weight && <div className="text-sm">{t('weight', lang)} <strong>{v.weight}kg</strong></div>}
                </div>
                {v.note && <div className="text-xs text-slate-400 mt-1">{v.note}</div>}

            );

      </div>
      {showForm && <VitalForm onClose={() => setShowForm(false)} lang={lang} />}
    </div>
  );
}

function VitalChart({ data, field, title, lang }) {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!ref.current || typeof Chart === 'undefined') return;
    if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
    let datasets = [];
    if (field === 'bp') {
      const bp = data.filter(d => d.systolic); if (!bp.length) return;
      datasets = [
        { label: t('systolic', lang), data: bp.map(d => ({ x: d.datetime, y: d.systolic })), borderColor: '#ef4444', backgroundColor: '#ef444422', tension: 0.3 },
        { label: t('diastolic', lang), data: bp.map(d => ({ x: d.datetime, y: d.diastolic })), borderColor: '#3b82f6', backgroundColor: '#3b82f622', tension: 0.3 },
      ];
    } else if (field === 'glucose') {
      const gl = data.filter(d => d.glucose); if (!gl.length) return;
      const byType = { fasting: [], postprandial: [], bedtime: [], random: [] };
      gl.forEach(d => (byType[d.glucoseType || 'random'] || byType.random).push({ x: d.datetime, y: d.glucose }));
      const colors = { fasting: '#10b981', postprandial: '#f59e0b', bedtime: '#8b5cf6', random: '#6b7280' };
      Object.keys(byType).forEach(k => { if (byType[k].length) datasets.push({ label: gluText(k, lang), data: byType[k], borderColor: colors[k], backgroundColor: colors[k]+'22', tension: 0.3 }); });
    } else if (field === 'spo2') {
      const sp = data.filter(d => d.spo2); if (!sp.length) return;
      datasets = [{ label: 'SpO2', data: sp.map(d => ({ x: d.datetime, y: d.spo2 })), borderColor: '#06b6d4', backgroundColor: '#06b6d422', tension: 0.3 }];
    }
    if (!datasets.length) return;
    chartRef.current = new Chart(ref.current, { type: 'line', data: { datasets }, options: { responsive: true, maintainAspectRatio: false, scales: { x: { type: 'time', time: { unit: 'day', displayFormats: { day: 'MM/dd' } }, grid: { display: false } }, y: { beginAtZero: false } }, plugins: { legend: { position: 'bottom' } } } });
    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [data, field, lang]);
  const has = (field === 'bp' && data.some(d => d.systolic)) || (field === 'glucose' && data.some(d => d.glucose)) || (field === 'spo2' && data.some(d => d.spo2));
  if (!has) return null;
  return <div className="bg-white rounded-xl p-4 border border-slate-200"><div className="font-medium mb-3">{title}</div><div className="h-56"><canvas ref={ref}></canvas></div></div>;
}

// ========== Medications（移除打卡，加入拍藥袋 AI 辨識） ==========
function Medications({ lang }) {
  const { state, dispatch } = useContext(AppCtx);
  const pid = state.currentPatientId;
  const meds = state.medications[pid] || [];
  const [editing, setEditing] = useState(null);
  const [scanning, setScanning] = useState(false);
  const fileRef = useRef(null);
  const active = meds.filter(m => m.active);
  const inactive = meds.filter(m => !m.active);

  const handleScan = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (!USE_BACKEND && !state.settings.apiKey) { alert('AI 功能目前無法使用'); e.target.value = ''; return; }
    if (!USE_BACKEND && state.settings.aiProvider === 'anthropic') { alert('拍藥袋辨識請用 Gemini 或 OpenAI'); e.target.value = ''; return; }
    setScanning(true);
    try {
      const base64 = await new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(r.result.split(',')[1]);
        r.onerror = reject;
        r.readAsDataURL(file);
      });
      const sys = '你是長照用藥 OCR 助手。輸入是台灣醫院 / 藥局的藥袋 / 藥單照片。請辨識後回傳 JSON 陣列，每個元素格式：{"name":"藥名（中文或英文）","dosage":"劑量與服用方式，例如 5mg 一次一顆","schedule":["morning","noon","evening","bedtime"],"withFood":"飯前/飯後/飯中/空腹/不限","note":"備註"}。只回傳純 JSON 陣列，不加 markdown，不加解釋。若無法辨識回傳 [].';
      const text = await callAIVision(state.settings, sys, '請辨識此藥袋上的所有藥物', base64, file.type);
      const clean = text.replace(/```json/g, '').replace(/```/g, '').trim();
      const items = JSON.parse(clean);
      if (!Array.isArray(items)) throw new Error('AI 回傳非陣列');
      if (items.length === 0) { alert('未辨識到藥物'); return; }
      // 開啟批次確認
      setEditing({ _scanned: items });
    } catch (err) { alert('辨識失敗: ' + err.message); }
    finally { setScanning(false); e.target.value = ''; }
  };

  return (
    <div className="space-y-4">
      <div className="flex gap-2">
        <Btn onClick={() => setEditing({})} className="flex-1">{t('addMed', lang)}</Btn>
        <label className={'px-4 py-2.5 rounded-lg font-medium text-sm ' + (scanning ? 'bg-slate-300 text-slate-500' : 'bg-emerald-600 text-white hover:bg-emerald-700') + ' cursor-pointer'}>
          {scanning ? t('scanningImage', lang) : t('scanBag', lang)}
          <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handleScan} className="hidden" disabled={scanning} />
        </label>
      </div>

      {active.length > 0 && (
        <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
          <div className="px-4 py-3 border-b border-slate-100 font-medium">{t('currentMedsList', lang)}（{active.length}）</div>
          <div className="divide-y divide-slate-100">
            {active.map(m => (
              <button key={m.id} onClick={() => setEditing(m)} className="w-full px-4 py-3 text-left hover:bg-slate-50">
                <div className="flex justify-between items-start">
                  <div className="flex-1">
                    <div className="font-medium">{m.name}</div>
                    <div className="text-xs text-slate-500 mt-0.5">{m.dosage}</div>
                    <div className="flex gap-2 mt-1.5">
                      {m.schedule?.length > 0 && <span className="text-xs px-2 py-0.5 bg-cyan-50 text-cyan-700 rounded">{m.schedule.map(s => slotText(s, lang)).join(' / ')}</span>}
                      {m.withFood && <span className="text-xs px-2 py-0.5 bg-slate-100 rounded">{m.withFood}</span>}
                    </div>
                    {m.note && <div className="text-xs text-slate-400 mt-1">{m.note}</div>}
                  </div>
                  <div className="text-slate-400 text-xs">›</div>
                </div>
              </button>
            ))}
          </div>
        </div>
      )}
      {active.length === 0 && <Empty title={t('noRecords', lang)} />}

      {inactive.length > 0 && (
        <details className="bg-white rounded-xl border border-slate-200 overflow-hidden">
          <summary className="px-4 py-3 border-b border-slate-100 font-medium cursor-pointer">{t('stoppedMeds', lang)}（{inactive.length}）</summary>
          {inactive.map(m => (
            <button key={m.id} onClick={() => setEditing(m)} className="w-full px-4 py-3 text-left flex justify-between border-b border-slate-100 last:border-0 hover:bg-slate-50">
              <div><div className="font-medium text-slate-500 line-through">{m.name}</div><div className="text-xs text-slate-400">{m.dosage}</div></div>
            </button>
          ))}
        </details>
      )}

      {editing && <MedicationForm med={editing} onClose={() => setEditing(null)} lang={lang} />}
    </div>
  );
}

function MedicationForm({ med, onClose, lang }) {
  const { dispatch } = useContext(AppCtx);
  // 支援批次（_scanned 是陣列）
  const batch = med._scanned;
  const [batchIdx, setBatchIdx] = useState(0);
  const initialForm = (() => {
    if (batch && batch[0]) return { name: '', dosage: '', schedule: ['morning'], withFood: '飯後', note: '', active: true, ...batch[0] };
    return { name: '', dosage: '', schedule: ['morning'], withFood: '飯後', note: '', active: true, ...med };
  })();
  const [form, setForm] = useState(initialForm);
  const isNew = !med.id;
  const up = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const saveCurrent = () => {
    if (!form.name.trim()) return alert('Name required');
    if (med.id) { dispatch({ type: 'UPDATE_MEDICATION', payload: form }); onClose(); return; }
    dispatch({ type: 'ADD_MEDICATION', payload: form });
    if (batch && batchIdx + 1 < batch.length) {
      const next = batch[batchIdx + 1];
      setBatchIdx(batchIdx + 1);
      setForm({ name: '', dosage: '', schedule: ['morning'], withFood: '飯後', note: '', active: true, ...next });
    } else {
      onClose();
    }
  };
  const remove = () => { if (confirm('Delete?')) { dispatch({ type: 'DELETE_MEDICATION', payload: form.id }); onClose(); } };

  return (
    <Modal open={true} onClose={onClose} title={batch ? `辨識結果 ${batchIdx+1}/${batch.length}` : isNew ? t('addMed', lang) : t('editPatient', lang)}>
      {batch && <div className="mb-3 p-3 bg-emerald-50 border border-emerald-200 rounded-lg text-xs text-emerald-800">AI 辨識結果，請確認後儲存。下一筆會自動帶入。</div>}
      <div className="space-y-4">
        <div><Label required>{t('medName', lang)}</Label><VoiceInput value={form.name} onChange={v => up('name', v)} /></div>
        <div><Label>{t('dosage', lang)}</Label><VoiceInput value={form.dosage} onChange={v => up('dosage', v)} /></div>
        <div><Label>{t('schedule', lang)}</Label>
          <Chips options={[['morning', t('schedule', lang)+' · '+slotText('morning', lang)], ['noon', slotText('noon', lang)], ['evening', slotText('evening', lang)], ['bedtime', slotText('bedtime', lang)]]} multi value={form.schedule} onChange={v => up('schedule', v)} />
        </div>
        <div><Label>{t('withFood', lang)}</Label>
          <Chips options={['飯前','飯後','飯中','空腹','不限']} value={form.withFood} onChange={v => v && up('withFood', v)} />
        </div>
        <div><Label>{t('note', lang)}</Label><VoiceTextArea rows={2} value={form.note} onChange={v => up('note', v)} /></div>
        {!isNew && <div className="flex items-center gap-2"><input type="checkbox" id="active" checked={form.active} onChange={e => up('active', e.target.checked)} className="w-5 h-5" /><label htmlFor="active" className="text-sm">{t('stillTaking', lang)}</label></div>}
        <div className="flex gap-2">
          <Btn onClick={saveCurrent} className="flex-1">{batch && batchIdx + 1 < batch.length ? t('save', lang) + ' → 下一筆' : (isNew ? t('add', lang) : t('save', lang))}</Btn>
          {!isNew && <Btn variant="danger" onClick={remove}>{t('delete', lang)}</Btn>}
          <Btn variant="secondary" onClick={onClose}>{t('cancel', lang)}</Btn>
        </div>
      </div>
    </Modal>
  );
}

// ========== Consultations（含 AI 回診提醒） ==========
function Consultations({ lang }) {
  const { state, dispatch } = useContext(AppCtx);
  const pid = state.currentPatientId;
  const items = state.consultations[pid] || [];
  const questions = (state.preVisitQuestions[pid] || []).filter(q => !q.done);
  const aiReminders = state.aiReminders[pid] || '';
  const [editing, setEditing] = useState(null);
  const [viewing, setViewing] = useState(null);
  const [newQ, setNewQ] = useState('');
  const [generatingReminders, setGeneratingReminders] = useState(false);

  const generateReminders = async () => {
    if (!USE_BACKEND && !state.settings.apiKey) return alert('AI 功能目前無法使用');
    setGeneratingReminders(true);
    try {
      const patient = state.patients.find(p => p.id === pid);
      const recentVitals = (state.vitals[pid] || []).filter(v => daysBetween(v.datetime, now()) <= 30);
      const meds = (state.medications[pid] || []).filter(m => m.active);
      const careLogs = (state.careLogs[pid] || []).filter(l => daysBetween(l.datetime, now()) <= 30);
      const lastConsult = [...items].sort((a,b) => new Date(b.date) - new Date(a.date))[0];
      const upcoming = items.filter(c => c.nextVisit && new Date(c.nextVisit) >= new Date()).sort((a,b) => new Date(a.nextVisit) - new Date(b.nextVisit))[0];

      const sys = '你是長照照顧專員。請根據以下病人近期資料，產出「下次回診建議確認事項清單」。使用繁體中文，不要編造資料，只針對真正值得問醫生的事。格式：只回傳純 JSON 陣列，每個元素是一行建議問題字串，例如 ["近期血壓連續偏高，請問是否需要調整降壓藥劑量？","最近的用藥是否有引起頭暈（附上日期）？"]。最多 8 條。不要包 markdown。';
      const vitalsSum = recentVitals.slice(-20).map(v => `${fmtDate(v.datetime)} ${v.systolic?`BP ${v.systolic}/${v.diastolic}`:''}${v.glucose?` 血糖 ${v.glucose}(${v.glucoseType})`:''}${v.spo2?` SpO2 ${v.spo2}`:''}${v.temperature?` 體溫 ${v.temperature}`:''}`).join('\n');
      const medsSum = meds.map(m => `· ${m.name} ${m.dosage} (${m.schedule?.join('/')})`).join('\n');
      const careSum = careLogs.slice(-5).map(l => `${fmtDate(l.datetime)} [${l.mode}] ${l.quickTags?.join('、')||''} ${l.content||''}`).join('\n');
      const user = `病人：${patient?.name}（${patient?.conditions || '無填'}）\n過敏：${patient?.allergies || '無'}\n\n【近 30 天數值】\n${vitalsSum || '無'}\n\n【目前用藥】\n${medsSum || '無'}\n\n【近期病況】\n${careSum || '無'}\n\n【上次看診】\n${lastConsult ? `${fmtDate(lastConsult.date)} ${lastConsult.department} 診斷：${lastConsult.diagnosis || '無'} 醫囑：${lastConsult.plan || '無'}` : '無'}\n\n【下次回診】${upcoming ? `${fmtDate(upcoming.nextVisit)} ${upcoming.hospital} ${upcoming.department}` : '未安排'}`;

      const text = await callAI(state.settings, sys, user);
      const clean = text.replace(/```json/g, '').replace(/```/g, '').trim();
      const list = JSON.parse(clean);
      dispatch({ type: 'SET_AI_REMINDERS', payload: list.join('\n') });
    } catch (err) { alert('產生失敗: ' + err.message); }
    finally { setGeneratingReminders(false); }
  };

  return (
    <div className="space-y-4">
      <div className="bg-gradient-to-br from-amber-50 to-orange-50 border border-amber-200 rounded-xl p-4">
        <div className="font-medium text-amber-900 mb-2">{t('preVisitTitle', lang)}（{questions.length}）</div>
        <div className="space-y-1.5 mb-3">
          {questions.slice(0, 8).map(q => (
            <div key={q.id} className="flex items-center gap-2 text-sm">
              <input type="checkbox" checked={q.done} onChange={() => dispatch({ type: 'TOGGLE_QUESTION', payload: q.id })} className="w-4 h-4" />
              <span className="flex-1 text-slate-700">{q.text}</span>
              <button onClick={() => dispatch({ type: 'DELETE_QUESTION', payload: q.id })} className="text-slate-300 hover:text-red-500">×</button>
            </div>
          ))}
        </div>
        <div className="flex gap-2">
          <div className="flex-1"><VoiceInput value={newQ} onChange={setNewQ} placeholder="Add a question..." /></div>
          <Btn onClick={() => { if(newQ.trim()) { dispatch({ type: 'ADD_QUESTION', payload: { text: newQ.trim() } }); setNewQ(''); }}}>{t('add', lang)}</Btn>
        </div>
      </div>

      {/* AI 回診提醒 */}
      <div className="bg-gradient-to-br from-purple-50 to-pink-50 border border-purple-200 rounded-xl p-4">
        <div className="flex items-center justify-between mb-2">
          <div className="font-medium text-purple-900">{t('aiRemindersTitle', lang)}</div>
          <Btn variant="secondary" onClick={generateReminders} disabled={generatingReminders}>{generatingReminders ? t('generating', lang) : t('generateAiReminders', lang)}</Btn>
        </div>
        {aiReminders ? (
          <div className="space-y-1.5">
            {aiReminders.split('\n').filter(Boolean).map((r, i) => (
              <div key={i} className="flex items-start gap-2 text-sm text-slate-700"><span className="text-purple-500 mt-0.5">·</span><span>{r}</span><button onClick={() => { const text = aiReminders.split('\n').filter(Boolean)[i]; dispatch({ type: 'ADD_QUESTION', payload: { text } }); }} className="ml-auto text-xs text-purple-600 hover:text-purple-800 shrink-0">加入清單</button></div>
            ))}
          </div>
        ) : (
          <div className="text-xs text-slate-500">根據你的數值、用藥、病況自動分析值得確認的事項。</div>
        )}
      </div>

      <Btn onClick={() => setEditing({})} className="w-full">{t('addVisit', lang)}</Btn>
      {items.length === 0 ? <Empty title={t('noVisits', lang)} /> : (
        <div className="space-y-3">
          {[...items].sort((a,b) => new Date(b.date) - new Date(a.date)).map(c => (
            <button key={c.id} onClick={() => setViewing(c)} className="w-full bg-white rounded-xl p-4 border border-slate-200 text-left hover:border-cyan-300 hover:shadow-sm transition">
              <div className="flex justify-between items-start mb-1"><div className="font-medium">{c.hospital} · {c.department}</div><div className="text-xs text-slate-400">{fmtDate(c.date)}</div></div>
              {c.doctor && <div className="text-xs text-slate-500 mb-2">{t('doctor', lang)}：{c.doctor}</div>}
              {c.diagnosis && <div className="text-sm text-slate-700 line-clamp-2 mb-2">{c.diagnosis}</div>}
              <div className="flex gap-2 text-xs">
                {c.transcription && <span className="px-2 py-0.5 bg-cyan-50 text-cyan-700 rounded">{t('recordVoice', lang)}</span>}
                {c.aiSummary && <span className="px-2 py-0.5 bg-emerald-50 text-emerald-700 rounded">AI</span>}
                {c.nextVisit && <span className="px-2 py-0.5 bg-amber-50 text-amber-700 rounded">{fmtDate(c.nextVisit)}</span>}
              </div>
            </button>
          ))}
        </div>
      )}
      {editing && <ConsultationForm item={editing} onClose={() => setEditing(null)} lang={lang} />}
      {viewing && <ConsultationView item={viewing} onClose={() => setViewing(null)} onEdit={() => { setEditing(viewing); setViewing(null); }} lang={lang} />}
    </div>
  );
}

function VoiceRecorder({ transcription, onTranscriptChange, onSummaryGenerated, patient, meds, settings, lang }) {
  const [recording, setRecording] = useState(false);
  const [generating, setGenerating] = useState(false);
  const [transcribing, setTranscribing] = useState(false);
  const [seconds, setSeconds] = useState(0);
  const recRef = useRef(null);
  const chunksRef = useRef([]);
  const streamRef = useRef(null);
  const timerRef = useRef(null);

  // 產生背景資訊給 AI 辨識時參考（病人病史 + 目前用藥）
  const buildContext = () => {
    const parts = [];
    if (patient?.name) parts.push(`病患：${patient.name}`);
    if (patient?.conditions) parts.push(`已知疾病：${patient.conditions}`);
    if (patient?.allergies) parts.push(`過敏：${patient.allergies}`);
    if (meds && meds.length) {
      parts.push('目前服用藥物：');
      meds.forEach(m => parts.push(`- ${m.name}${m.dosage ? ' ' + m.dosage : ''}`));
    }
    return parts.join('\n');
  };

  // 用 MediaRecorder 錄音 → 停止後送後端 Gemini 辨識（支援 iOS、Android、桌面）
  const startRec = async () => {
    if (!USE_BACKEND) return alert('醫囑錄音需要平台模式');
    if (!navigator.mediaDevices?.getUserMedia || typeof MediaRecorder === 'undefined') {
      return alert('此瀏覽器不支援錄音。請改用 Chrome / Safari / Edge');
    }
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true, sampleRate: 16000, channelCount: 1 } });
      streamRef.current = stream;
      const mimeType = pickMimeType();
      const mr = new MediaRecorder(stream, mimeType ? { mimeType } : undefined);
      chunksRef.current = [];
      mr.ondataavailable = (e) => { if (e.data.size > 0) chunksRef.current.push(e.data); };
      mr.onstop = async () => {
        streamRef.current?.getTracks().forEach(t => t.stop());
        streamRef.current = null;
        if (timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; }
        const type = mr.mimeType || 'audio/webm';
        const blob = new Blob(chunksRef.current, { type });
        if (blob.size < 1000) { alert('錄音時間太短，請再試一次'); return; }
        setTranscribing(true);
        try {
          const ext = type.includes('mp4') ? 'mp4' : type.includes('ogg') ? 'ogg' : 'webm';
          const form = new FormData();
          form.append('audio', blob, 'visit.' + ext);
          form.append('mode', 'medical');
          form.append('context', buildContext());
          
          const tok = getToken();
          const res = await fetch(BACKEND_URL + '/api/ai/transcribe', {
            method: 'POST',
            headers: tok ? { 'Authorization': 'Bearer ' + tok } : {},
            body: form
          });
          if (!res.ok) throw new Error(await readError(res));
          const data = await res.json();
          if (data.text) onTranscriptChange(transcription ? transcription + '\n\n' + data.text : data.text);
        } catch (e) { alert('辨識失敗：' + (e.message || e).toString().slice(0, 200)); }
        finally { setTranscribing(false); }
      };
      recRef.current = mr;
      mr.start();
      setRecording(true);
      setSeconds(0);
      timerRef.current = setInterval(() => setSeconds(s => s + 1), 1000);
    } catch (e) {
      alert('無法取用麥克風：' + (e.message || e.name) + '\n\n請確認已允許麥克風權限。');
    }
  };
  const stopRec = () => {
    setRecording(false);
    try { recRef.current?.stop(); } catch {}
    recRef.current = null;
  };

  const generate = async () => {
    if (!transcription?.trim()) return alert('沒有逐字稿可摘要');
    setGenerating(true);
    try {
      const sys = '你是長照醫療助理。請根據醫囑錄音逐字稿，產出給家屬的結構化摘要，使用繁體中文、白話、註解專業名詞。格式：【診斷】【醫囑／處置】【下次回診】【家屬待辦】【需再確認】。未提及則寫「錄音未提及」。不編造。';
      const user = patient ? `被照顧者：${patient.name}${patient.conditions ? `（${patient.conditions}）` : ''}\n\n逐字稿：\n${transcription}` : `逐字稿：\n${transcription}`;
      const text = await callAI(settings, sys, user);
      onSummaryGenerated(text);
    } catch (e) { alert('Failed: ' + e.message); }
    finally { setGenerating(false); }
  };

  // 上傳音檔功能（用戶已有 mp3 檔）
  const handleAudioUpload = async (e) => {
    const file = e.target.files[0]; e.target.value = '';
    if (!file) return;
    if (!USE_BACKEND) return alert('需要平台模式');
    if (file.size > 20 * 1024 * 1024) return alert('音檔太大（>20MB）');
    setTranscribing(true);
    try {
      const form = new FormData();
      form.append('audio', file);
      form.append('mode', 'medical');
      form.append('context', buildContext());
      
      const tok = getToken();
      const res = await fetch(BACKEND_URL + '/api/ai/transcribe', {
        method: 'POST',
        headers: tok ? { 'Authorization': 'Bearer ' + tok } : {},
        body: form
      });
      if (!res.ok) throw new Error(await readError(res));
      const data = await res.json();
      if (data.text) onTranscriptChange(transcription ? transcription + '\n\n' + data.text : data.text);
    } catch (err) { alert('辨識失敗：' + (err.message || err).toString().slice(0, 200)); }
    finally { setTranscribing(false); }
  };

  return (
    <div className="bg-slate-50 border border-slate-200 rounded-xl p-4 space-y-3">
      <div className="flex items-center justify-between flex-wrap gap-2">
        <div className="font-medium text-sm">{t('recordVoice', lang)}</div>
        <div className="flex gap-2">
          {!recording && !transcribing ? (
            <>
              <button type="button" onClick={startRec} className="px-4 py-2 bg-red-500 text-white rounded-lg font-medium text-sm hover:bg-red-600">{t('startRec', lang)}</button>
              <label className="px-4 py-2 bg-white text-slate-700 border border-slate-300 rounded-lg font-medium text-sm hover:bg-slate-50 cursor-pointer">
                {t('uploadAudio', lang)}
                <input type="file" accept="audio/*" onChange={handleAudioUpload} className="hidden" />
              </label>
            </>
          ) : recording ? (

  const [showForm, setShowForm] = useState(false);

    const patient = state.patients.find(p => p.id === pid);
    const lines = [];
    lines.push(`【${t(MODES[l.mode], lang)}紀錄】`);
    if (patient?.name) lines.push(`對象：${patient.name}`);
    lines.push(`時間：${fmtDateTime(l.datetime)}`);
    if (l.authorName) lines.push(`紀錄人：${l.authorName}`);
    if (l.quickTags?.length) {
      lines.push('');
      lines.push('― 觀察狀態 ―');
      l.quickTags.forEach(tag => lines.push(`・${tag}`));
    }
    if (l.content) {
      lines.push('');
      lines.push('― 補充描述 ―');
      lines.push(l.content);
    }
    if (l.followUp) {
      lines.push('');
      lines.push('― 接手請注意 ―');
      lines.push(l.followUp);
    }
    lines.push('');
    lines.push('───────────');
    lines.push('來自 醫囑管理工具');
    shareToLine(lines.join('\n'));
  };
  return (
    <div className="space-y-4">

// ========== ERCard 新版（7 天統計） ==========
function ERCard({ lang }) {
  const { state } = useContext(AppCtx);
  const pid = state.currentPatientId;
  const p = state.patients.find(x => x.id === pid);
  const meds = (state.medications[pid] || []).filter(m => m.active);
  const vitals = state.vitals[pid] || [];
  if (!p) return <Empty title={t('addPatient', lang)} />;

  const stats = useMemo(() => {
    const cutoff = Date.now() - 7 * 86400000;
    const recent = vitals.filter(v => new Date(v.datetime).getTime() >= cutoff);
    const bps = recent.filter(v => v.systolic);
    const gls = recent.filter(v => v.glucose);
    const sps = recent.filter(v => v.spo2);
    const temps = recent.filter(v => v.temperature);
    const avg = arr => Math.round(arr.reduce((s,x)=>s+x,0)/arr.length);
    const bpStats = (() => {
      if (!bps.length) return null;
      const maxSys = Math.max(...bps.map(v => v.systolic));
      const rowMax = bps.find(v => v.systolic === maxSys);
      return {
        count: bps.length,
        avgSys: avg(bps.map(v => v.systolic)),
        avgDia: avg(bps.map(v => v.diastolic)),
        maxSys,
        maxDia: rowMax?.diastolic || 0,
        abn: bps.filter(v => { const s = classifyBP(v.systolic, v.diastolic); return s && (s.level === 'high' || s.level === 'crisis'); }).length
      };
    })();
    const glStats = gls.length ? {
      count: gls.length,
      avg: avg(gls.map(v => v.glucose)),
      max: Math.max(...gls.map(v => v.glucose)),
      abn: gls.filter(v => { const s = classifyGlucose(v.glucose, v.glucoseType); return s && (s.level === 'high'); }).length
    } : null;
    const spStats = sps.length ? { count: sps.length, avg: avg(sps.map(v => v.spo2)), min: Math.min(...sps.map(v => v.spo2)), abn: sps.filter(v => v.spo2 < 95).length } : null;
    const tStats = temps.length ? { count: temps.length, max: Math.max(...temps.map(v => v.temperature)), abn: temps.filter(v => v.temperature >= 37.3).length } : null;
    return { bpStats, glStats, spStats, tStats };
  }, [vitals]);

  const age = p.birthDate ? new Date().getFullYear() - new Date(p.birthDate).getFullYear() : '';
  const Section = ({ title, children, danger }) => (
    <div className={'mb-3 p-3 rounded-lg ' + (danger ? 'bg-red-50 border border-red-200' : 'bg-slate-50')}>
      <div className={'text-xs font-semibold mb-1 ' + (danger ? 'text-red-700' : 'text-slate-500')}>{title}</div>
      <div className="text-slate-800">{children}</div>
    </div>
  );
  return (
    <div className="space-y-4">
      <Btn onClick={() => window.print()} className="w-full">{t('printCard', lang)}</Btn>
      <div className="bg-white rounded-xl border-2 border-red-500 p-5 print:border-0 print:shadow-none" id="er-card">
        <div className="border-b-2 border-red-500 pb-3 mb-4">
          <div className="text-2xl font-bold">{t('medicalCard', lang)}</div>
          <div className="text-xs text-slate-500">{fmtDate(now())}</div>
        </div>
        <div className="grid grid-cols-2 gap-3 mb-4">
          <div><div className="text-xs text-slate-500">{t('name', lang)}</div><div className="font-bold text-lg">{p.name}</div></div>
          <div><div className="text-xs text-slate-500">{t('birthDate', lang)}</div><div className="font-medium">{age ? `${age}` : '—'} · {p.gender}</div></div>
          <div><div className="text-xs text-slate-500">{t('bloodType', lang)}</div><div className="font-medium">{p.bloodType || '—'}</div></div>
          <div><div className="text-xs text-slate-500">{t('height', lang)} / {t('weight', lang)}</div><div className="font-medium">{p.height || '?'} / {p.weight || '?'}</div></div>
        </div>
        {p.conditions && <Section title={t('conditions', lang)}>{p.conditions}</Section>}
        {p.allergies && <Section title={t('allergies', lang)} danger>{p.allergies}</Section>}
        {p.medicalHistory && <Section title={t('medicalHistory', lang)}>{p.medicalHistory}</Section>}

        <Section title={t('currentMeds', lang)}>
          {meds.length === 0 ? <span className="text-slate-400 text-sm">{t('none', lang)}</span> : meds.map(m => (
            <div key={m.id} className="text-sm">· <strong>{m.name}</strong>{m.dosage && ` — ${m.dosage}`} {m.schedule?.length > 0 && `（${m.schedule.map(s => slotText(s, lang)).join('/')}）`} {m.withFood}</div>
          ))}
        </Section>

        {/* 新版：7 天統計 */}
        {(stats.bpStats || stats.glStats || stats.spStats || stats.tStats) && (
          <Section title={t('last7DaysVitals', lang)}>
            <div className="grid grid-cols-2 gap-2 text-xs">
              {stats.bpStats && (
                <div className="bg-white p-2 rounded border border-slate-200">
                  <div className="text-slate-500 mb-0.5">{t('systolic', lang)}/{t('diastolic', lang)}</div>
                  <div className="text-sm font-semibold">{t('avgBP', lang)}：{stats.bpStats.avgSys}/{stats.bpStats.avgDia}</div>
                  <div className="text-xs">{t('highestBP', lang)}：{stats.bpStats.maxSys}</div>
                  {stats.bpStats.abn > 0 && <div className="text-red-600 mt-1">{t('abnormalCount', lang)} {stats.bpStats.abn}/{stats.bpStats.count}</div>}
                </div>
              )}
              {stats.glStats && (
                <div className="bg-white p-2 rounded border border-slate-200">
                  <div className="text-slate-500 mb-0.5">{t('glucose', lang)}</div>
                  <div className="text-sm font-semibold">平均 {stats.glStats.avg}</div>
                  <div className="text-xs">最高 {stats.glStats.max}</div>
                  {stats.glStats.abn > 0 && <div className="text-red-600 mt-1">{t('abnormalCount', lang)} {stats.glStats.abn}/{stats.glStats.count}</div>}
                </div>
              )}
              {stats.spStats && (
                <div className="bg-white p-2 rounded border border-slate-200">
                  <div className="text-slate-500 mb-0.5">{t('spo2', lang)}</div>
                  <div className="text-sm font-semibold">平均 {stats.spStats.avg}%</div>
                  <div className="text-xs">最低 {stats.spStats.min}%</div>
                  {stats.spStats.abn > 0 && <div className="text-red-600 mt-1">{t('abnormalCount', lang)} {stats.spStats.abn}</div>}
                </div>
              )}
              {stats.tStats && (
                <div className="bg-white p-2 rounded border border-slate-200">
                  <div className="text-slate-500 mb-0.5">{t('temperature', lang)}</div>
                  <div className="text-sm font-semibold">最高 {stats.tStats.max}°C</div>
                  {stats.tStats.abn > 0 && <div className="text-red-600 mt-1">{t('abnormalCount', lang)} {stats.tStats.abn}</div>}
                </div>
              )}
            </div>
          </Section>
        )}
      </div>
      <style>{`@media print { body * { visibility: hidden; } #er-card, #er-card * { visibility: visible; } #er-card { position: absolute; left: 0; top: 0; width: 100%; } }`}</style>
    </div>
  );
}

  const testAPI = async () => {
    if (!form.apiKey) { setTestResult({ ok: false, msg: '請先貼入 API Key' }); return; }
    setTesting(true); setTestResult(null);
    try {
      const reply = await callAI(form, '你是測試助手。請用繁體中文回覆「連線成功」四個字，不要加其他內容。', '測試');
      setTestResult({ ok: true, msg: `✓ 連線成功！回覆：「${reply.trim().slice(0, 30)}」` });
    } catch (e) {
      setTestResult({ ok: false, msg: '✗ 失敗：' + (e.message || e).toString().slice(0, 200) });
    } finally { setTesting(false); }
  };
  const exportAll = () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });

      <div className="min-h-screen bg-slate-50">
        <header className="bg-white border-b border-slate-200 px-4 py-3 flex items-center justify-between">
          <div><div className="font-bold">{t('caregiverModeTitle', lang)}</div><div className="text-xs text-slate-500">{patient.name}</div></div>
          <button onClick={onExit} className="text-sm text-slate-500">{t('switchToFamily', lang)}</button>
        </header>
        <main className="max-w-xl mx-auto p-4">
          {view === 'home' && (
            <div className="space-y-4 pt-4">
              <BigButton label={t('vitals', lang)} color="cyan" onClick={() => setView('bp')} />
              <BigButton label={t('meds', lang)} color="emerald" onClick={() => setView('meds')} />
            </div>
          )}
          {view === 'bp' && <CaregiverBP lang={lang} onBack={() => setView('home')} />}
          {view === 'meds' && <CaregiverMeds lang={lang} onBack={() => setView('home')} />}
        </main>
      </div>
    </AppCtx.Provider>
  );
}
const BigButton = ({ label, color, onClick }) => {
  const colors = { cyan: 'bg-cyan-600 hover:bg-cyan-700', emerald: 'bg-emerald-600 hover:bg-emerald-700', red: 'bg-red-500 hover:bg-red-600' };
  return <button onClick={onClick} className={'w-full p-8 rounded-2xl text-white text-2xl font-semibold shadow-md ' + colors[color]}>{label}</button>;
};
function CaregiverBP({ lang, onBack }) {
  const { dispatch } = useContext(AppCtx);
  const [form, setForm] = useState({ systolic: '', diastolic: '', glucose: '', glucoseType: 'fasting' });
  const [field, setField] = useState('systolic');
  const up = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const save = () => {
    if (!form.systolic && !form.glucose) return alert('Please enter');
    dispatch({ type: 'ADD_VITAL', payload: { datetime: now(), systolic: form.systolic?+form.systolic:null, diastolic: form.diastolic?+form.diastolic:null, glucose: form.glucose?+form.glucose:null, glucoseType: form.glucose?form.glucoseType:null } });
    alert('✓'); onBack();
  };
  return (
    <div className="space-y-4 pt-4">
      <div className="grid grid-cols-2 gap-2">
        <FieldBtn label={t('systolic', lang)} value={form.systolic} active={field==='systolic'} onClick={() => setField('systolic')} />
        <FieldBtn label={t('diastolic', lang)} value={form.diastolic} active={field==='diastolic'} onClick={() => setField('diastolic')} />
        <div className="col-span-2"><FieldBtn label={t('glucose', lang)} value={form.glucose} active={field==='glucose'} onClick={() => setField('glucose')} /></div>
      </div>
      {field === 'glucose' && <Chips options={Object.entries(GLU_TYPES).map(([k, v]) => [k, v[lang] || v.zh])} value={form.glucoseType} onChange={v => v && up('glucoseType', v)} />}
      <NumberPad onAppend={n => { const cur = form[field] || ''; if (cur.length >= 4) return; up(field, cur + n); }} onBackspace={() => up(field, (form[field] || '').slice(0, -1))} onClear={() => up(field, '')} />
      <div className="flex gap-2 pt-2"><button onClick={onBack} className="flex-1 py-3 bg-white border border-slate-300 rounded-xl font-medium">{t('back', lang)}</button><button onClick={save} className="flex-1 py-3 bg-cyan-600 text-white rounded-xl font-semibold">{t('save', lang)}</button></div>
    </div>
  );
}
function CaregiverMeds({ lang, onBack }) {
  const { state } = useContext(AppCtx);
  const meds = (state.medications[state.currentPatientId] || []).filter(m => m.active);
  return (
    <div className="space-y-3 pt-4">
      {meds.length === 0 && <div className="text-center py-8 text-slate-400">—</div>}
      {meds.map(m => (
        <div key={m.id} className="bg-white p-4 rounded-2xl border border-slate-200">
          <div className="font-semibold mb-1">{m.name}</div>
          <div className="text-xs text-slate-500 mb-2">{m.dosage} · {m.schedule?.map(s => slotText(s, lang)).join('/')} · {m.withFood}</div>
        </div>
      ))}
      <button onClick={onBack} className="w-full py-3 bg-white border border-slate-300 rounded-xl font-medium mt-4">{t('back', lang)}</button>
    </div>
  );
}

// ========== MainApp ==========
function MainApp({ profile, onLogout, lang, onLangChange }) {
  const [state, dispatch] = useReducer(reducer, null, () => loadState(profile.id));
  const [syncStatus, setSyncStatus] = useState('idle'); // idle | loading | saving | synced | error
  const [syncError, setSyncError] = useState('');
  const firstLoadRef = useRef(true);
  const saveTimerRef = useRef(null);

  // 寫入 localStorage（無論如何都存本地作為快取）
  useEffect(() => { saveState(profile.id, state); }, [state]);

  // 進入時：從雲端拉資料覆蓋本地
  useEffect(() => {
    if (!USE_BACKEND) { firstLoadRef.current = false; return; }
    setSyncStatus('loading');
    apiFetch('/api/data')
      .then(r => r.json())
      .then(d => {
        if (d.data && d.data.patients) {
          // 雲端有資料 → 覆蓋本地
          dispatch({ type: 'SET_STATE', payload: d.data });
          setSyncStatus('synced');
        } else {
          // 雲端沒資料 → 把本地資料推上雲端
          setSyncStatus('synced');
        }
      })
      .catch(e => { setSyncStatus('error'); setSyncError(e.message || String(e)); })
      .finally(() => { setTimeout(() => { firstLoadRef.current = false; }, 500); });
  }, []);

  // 有變動時：debounce 3 秒後推到雲端
  useEffect(() => {
    if (!USE_BACKEND) return;
    if (firstLoadRef.current) return; // 剛載入那次不要立刻存
    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    setSyncStatus('saving');
    saveTimerRef.current = setTimeout(async () => {
      try {
        const res = await apiFetch('/api/data', { method: 'PUT', body: JSON.stringify({ data: state }) });
        if (!res.ok) throw new Error(await readError(res));
        setSyncStatus('synced');
      } catch (e) {
        setSyncStatus('error');
        setSyncError((e.message || String(e)).slice(0, 200));
      }
    }, 3000);
    return () => { if (saveTimerRef.current) clearTimeout(saveTimerRef.current); };
  }, [state]);

  useEffect(() => { if (state.settings.lang && state.settings.lang !== lang) onLangChange(state.settings.lang); }, []);
  const [tab, setTab] = useState('dashboard');
  const [showPatientEditor, setShowPatientEditor] = useState(false);
  const [showAbout, setShowAbout] = useState(false);
  const [showMenu, setShowMenu] = useState(false);
  const hasPatient = !!state.currentPatientId;
  const tabs = [['dashboard', t('dashboard', lang)], ['vitals', t('vitals', lang)], ['meds', t('meds', lang)], ['consult', t('consult', lang)], ['care', t('care', lang)], ['er', t('erCard', lang)]];
  return (
    <AppCtx.Provider value={{ state, dispatch }}>
      <div className="min-h-screen pb-24">
        <header className="bg-white/80 backdrop-blur-md border-b border-slate-200/70 sticky top-0 z-30 print:hidden">
          <div className="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between gap-3">
            <button onClick={() => setShowAbout(true)} className="flex items-center gap-2 min-w-0 hover:opacity-80" title="查看介紹頁">
              <div className="w-9 h-9 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-sm shrink-0 shadow-sm">醫</div>
              <div className="min-w-0 text-left">
                <div className="font-bold text-sm truncate">{t('appName', lang)}</div>
              </div>
            </button>
            <div className="flex items-center gap-2">
              <SyncIndicator status={syncStatus} error={syncError} />
              <LangSwitcher value={lang} onChange={(v) => { onLangChange(v); dispatch({ type: 'UPDATE_SETTINGS', payload: { lang: v } }); }} compact />
              <PatientSwitcher lang={lang} />
              <div className="relative">
                <button onClick={() => setShowMenu(!showMenu)} className="flex items-center justify-center w-9 h-9 rounded-full bg-cyan-100 hover:bg-cyan-200 overflow-hidden" title={profile.name}>
                  {profile.pic ? <img src={profile.pic} alt="" className="w-full h-full object-cover" /> : <span className="text-cyan-700 font-semibold text-sm">{profile.name?.[0] || '?'}</span>}
                </button>
                {showMenu && (
                  <>
                    <div className="fixed inset-0 z-40" onClick={() => setShowMenu(false)} />
                    <div className="absolute right-0 top-full mt-1 bg-white border border-slate-200 rounded-lg shadow-lg z-50 min-w-[180px] py-1">
                      <div className="px-3 py-2 border-b border-slate-100">
                        <div className="font-medium text-sm truncate">{profile.name}</div>
                        <div className="text-xs text-slate-500 truncate">{profile.type === 'line' ? 'LINE 帳號' : profile.email || profile.type}</div>
                      </div>
                      <button onClick={() => { setShowAbout(true); setShowMenu(false); }} className="w-full text-left px-3 py-2 text-sm text-slate-700 hover:bg-slate-50">查看介紹頁</button>
                      <button onClick={() => { setShowMenu(false); onLogout(); }} className="w-full text-left px-3 py-2 text-sm text-red-600 hover:bg-red-50 border-t border-slate-100">登出</button>
                    </div>
                  </>
                )}
              </div>
            </div>
          </div>
        </header>
        {showAbout && <AboutOverlay lang={lang} onClose={() => setShowAbout(false)} />}
        <main className="max-w-3xl mx-auto px-4 pt-4">
          {!hasPatient ? (
            <div className="py-12 text-center">
              <div className="bg-white/80 backdrop-blur rounded-2xl p-8 border border-slate-200 max-w-md mx-auto">
                <h2 className="text-xl font-bold text-slate-900 mb-2">歡迎，{profile.name}</h2>
                <p className="text-sm text-slate-600 mb-6">開始建立你要照顧的對象，即可記錄數值、用藥、看診等資訊。</p>
                <Btn onClick={() => setShowPatientEditor(true)} className="w-full">＋ 新增被照顧者</Btn>
              </div>
            </div>
          ) : (
            <>
              {tab === 'dashboard' && <Dashboard lang={lang} />}
              {tab === 'vitals' && <Vitals lang={lang} />}
              {tab === 'meds' && <Medications lang={lang} />}
              {tab === 'consult' && <Consultations lang={lang} />}
              {tab === 'care' && <CareLogs lang={lang} />}
              {tab === 'er' && <ERCard lang={lang} />}
            </>
          )}
        </main>
        {hasPatient && (
          <nav className="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-slate-200/70 print:hidden z-30">
            <div className="max-w-3xl mx-auto flex">
              {tabs.map(([id, label]) => (
                <button key={id} onClick={() => setTab(id)} className={'flex-1 py-3.5 text-center border-t-2 text-sm whitespace-nowrap transition ' + (tab === id ? 'tab-active font-semibold' : 'border-transparent text-slate-500 hover:text-slate-700')}>{label}</button>
              ))}
            </div>
          </nav>
        )}
        {showPatientEditor && <PatientEditor patient={{}} onClose={() => setShowPatientEditor(false)} lang={lang} />}
      </div>
    </AppCtx.Provider>
  );
}

function PatientSwitcher({ lang }) {
  const { state, dispatch } = useContext(AppCtx);
  const [open, setOpen] = useState(false);
  const [editing, setEditing] = useState(null);
  const current = state.patients.find(p => p.id === state.currentPatientId);
  if (!current) return null;
  return (
    <>
      <button onClick={() => setOpen(true)} className="flex items-center gap-2 bg-slate-100 rounded-lg px-3 py-1.5 hover:bg-slate-200">
        <div className="w-7 h-7 rounded-full bg-cyan-500 text-white flex items-center justify-center font-semibold text-sm">{current.name[0]}</div>
        <div className="text-sm font-medium">{current.name}</div>
        <span className="text-slate-400 text-xs">▼</span>
      </button>
      <Modal open={open} onClose={() => setOpen(false)} title={t('addPatient', lang)}>
        <div className="space-y-2 mb-4">
          {state.patients.map(p => (
            <div key={p.id} className={'flex items-center gap-2 p-3 rounded-lg border ' + (p.id === state.currentPatientId ? 'border-cyan-500 bg-cyan-50' : 'border-slate-200')}>
              <button onClick={() => { dispatch({ type: 'SET_CURRENT_PATIENT', payload: p.id }); setOpen(false); }} className="flex items-center gap-3 flex-1 text-left">
                <div className="w-10 h-10 rounded-full bg-cyan-100 text-cyan-700 flex items-center justify-center font-semibold">{p.name[0]}</div>
                <div><div className="font-medium">{p.name}</div><div className="text-xs text-slate-500">{p.conditions?.slice(0,30)}</div></div>
              </button>
              <button onClick={() => { setEditing(p); setOpen(false); }} className="text-slate-500 text-sm px-2">{t('edit', lang)}</button>
            </div>
          ))}
        </div>
        <Btn onClick={() => { setEditing({}); setOpen(false); }} className="w-full">{t('addPatient', lang)}</Btn>
      </Modal>
      {editing && <PatientEditor patient={editing} onClose={() => setEditing(null)} lang={lang} />}
    </>
  );
}

// ========== Root ==========
function DebugPage({ onClose }) {
  const [result, setResult] = useState('載入中...');
  useEffect(() => {
    (async () => {
      const tok = getToken();
      const lines = [];
      lines.push('=== 前端狀態 ===');
      lines.push('BACKEND_URL: ' + (BACKEND_URL || '(空)'));
      lines.push('USE_BACKEND: ' + USE_BACKEND);
      lines.push('Token 存在: ' + (tok ? '是' : '否'));
      lines.push('Token 長度: ' + tok.length);
      lines.push('Token 前 30 字: ' + tok.slice(0, 30));
      lines.push('Token 段數: ' + (tok ? tok.split('.').length : 0));
      lines.push('');
      lines.push('=== Worker /health ===');
      try {
        const r = await fetch(BACKEND_URL + '/health');
        lines.push('Status: ' + r.status);
        lines.push('Body: ' + await r.text());
      } catch (e) { lines.push('ERROR: ' + e.message); }
      lines.push('');
      lines.push('=== Worker /api/debug (帶 token) ===');
      try {
        const r = await fetch(BACKEND_URL + '/api/debug?t=' + encodeURIComponent(tok), { headers: tok ? { 'Authorization': 'Bearer ' + tok } : {} });
        lines.push('Status: ' + r.status);
        lines.push('Body: ' + JSON.stringify(await r.json(), null, 2));
      } catch (e) { lines.push('ERROR: ' + e.message); }
      lines.push('');
      lines.push('=== Worker /api/auth/me ===');
      try {
        const r = await fetch(BACKEND_URL + '/api/auth/me', { headers: tok ? { 'Authorization': 'Bearer ' + tok } : {} });
        lines.push('Status: ' + r.status);
        lines.push('Body: ' + await r.text());
      } catch (e) { lines.push('ERROR: ' + e.message); }
      lines.push('');
      lines.push('=== Worker /api/ai/chat (測試 POST) ===');
      try {
        const r = await fetch(BACKEND_URL + '/api/ai/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...(tok ? { 'Authorization': 'Bearer ' + tok } : {}) },
          body: JSON.stringify({ system: '只回覆「OK」', user: '測試' })
        });
        lines.push('Status: ' + r.status);
        lines.push('Body: ' + await r.text());
      } catch (e) { lines.push('ERROR: ' + e.message); }
      setResult(lines.join('\n'));
    })();
  }, []);
  const copy = () => { navigator.clipboard.writeText(result).then(() => alert('已複製到剪貼簿')); };
  return (
    <div className="fixed inset-0 z-50 bg-white overflow-y-auto">
      <div className="sticky top-0 bg-white border-b border-slate-200 px-4 py-3 flex justify-between items-center">
        <div className="font-bold">診斷資訊</div>
        <div className="flex gap-2">
          <button onClick={copy} className="px-3 py-1.5 bg-cyan-600 text-white rounded text-sm">複製全部</button>
          <button onClick={onClose} className="px-3 py-1.5 bg-slate-200 rounded text-sm">關閉</button>
        </div>
      </div>
      <pre className="p-4 text-xs font-mono whitespace-pre-wrap">{result}</pre>
    </div>
  );
}

function Root() {
  const [profile, setProfile] = useState(null);
  const [lang, setLang] = useState('zh');
  const [checkingSession, setCheckingSession] = useState(USE_BACKEND);
  const [showDebug, setShowDebug] = useState(location.hash === '#debug');
  useEffect(() => {
    const onHash = () => setShowDebug(location.hash === '#debug');
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  useEffect(() => {
    // 有後端：只信後端的說法
    if (USE_BACKEND) {
      const tok = getToken();
      if (!tok) {
        // 沒 token 直接顯示 Landing，不讀本地 profile（避免「假登入」狀態）
        setCurrentProfileId(null);
        setCheckingSession(false);
        return;
      }
      apiFetch('/api/auth/me')
        .then(r => r.json())
        .then(d => {
          if (d.user) {
            const p = { id: d.user.id, name: d.user.name, pic: d.user.pic, type: d.user.provider || 'line' };
            const list = loadProfileIndex();
            if (!list.find(x => x.id === p.id)) { list.push(p); saveProfileIndex(list); }
            setCurrentProfileId(p.id);
            setProfile(p);
            const st = loadState(p.id);
            if (st.settings?.lang) setLang(st.settings.lang);
          } else {
            // token 無效（已過期或 JWT_SECRET 改過）→ 清乾淨，回到 Landing 重新登入
            setToken('');
            setCurrentProfileId(null);
          }
        })
        .catch(() => { setToken(''); setCurrentProfileId(null); })
        .finally(() => setCheckingSession(false));
      return;
    }
    // 無後端：只讀本地
    const pid = getCurrentProfileId();
    if (pid) {
      const list = loadProfileIndex();
      const found = list.find(p => p.id === pid);
      if (found) {
        setProfile(found);
        const st = loadState(found.id);
        if (st.settings?.lang) setLang(st.settings.lang);
      }
    }
  }, []);

  const handleLogin = (p) => {
    const list = loadProfileIndex();
    if (!list.find(x => x.id === p.id)) list.push(p);
    saveProfileIndex(list);
    setCurrentProfileId(p.id);
    setProfile(p);
  };
  const handleLogout = async () => {
    if (!confirm('Logout?')) return;
    if (USE_BACKEND) {
      try { await apiFetch('/api/auth/logout', { method: 'POST' }); } catch(e){}
      setToken('');
    }
    setCurrentProfileId(null);
    setProfile(null);
  };

  if (showDebug) return <DebugPage onClose={() => { location.hash = ''; setShowDebug(false); }} />;
  if (checkingSession) return <div className="min-h-screen flex items-center justify-center text-slate-500 text-sm">載入中…</div>;

  if (!profile) return <Landing onLogin={handleLogin} lang={lang} setLang={setLang} />;

  return <MainApp profile={profile} onLogout={handleLogout} lang={lang} onLangChange={setLang} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
